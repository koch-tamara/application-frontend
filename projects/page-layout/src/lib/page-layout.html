<div class="page-layout-container">
    @if (imageInformation){
        <div class="page-layout-container__image">
            <img [src]="imageInformation!.path" [alt]="imageInformation!.altText">
        </div>
    }
    <div class="page-layout-container__content"
        [ngClass]="{ 'page-layout-container__content--padding': addPadding }">
        <div class="page-layout-container__content__header">
            <ng-content select="[page-header]"></ng-content>
        </div>

        <div class="page-layout-container__content__body">
            <ng-content></ng-content>
        </div>
    </div>
</div>
